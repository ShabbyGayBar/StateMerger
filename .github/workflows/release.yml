name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing tag to publish/update (for example: v1.2.3)"
        required: true
        type: string
      sync_readme:
        description: "Sync README release links and commit to default branch"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  sync-readme-version:
    name: "Sync README Version"
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_readme == 'true') }}
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync version from tag
        run: uv run python scripts/sync_version_from_tag.py --tag "${TAG_NAME}"

      - name: Check for README changes
        id: readme_changes
        run: |
          if git diff --quiet -- README.md docs/README_zh-CN.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push README changes
        if: steps.readme_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/README_zh-CN.md
          git commit -m "docs: sync README release links for ${TAG_NAME}"
          git push origin "${{ github.event.repository.default_branch }}"

  build-gui-windows:
    runs-on: windows-latest
    needs: sync-readme-version
    if: ${{ always() && (needs.sync-readme-version.result == 'success' || needs.sync-readme-version.result == 'skipped') }}
    permissions:
      contents: read
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
      ARTIFACT_NAME: state-merger-${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync
          uv pip install pyinstaller
          uv pip install -e .

      - name: Build GUI EXE
        run: uv run pyinstaller -F -n state-merger -p "src" -w -i "docs/images/states.dds" -y --clean src/vic3_state_merger/gui.py

      - name: Build wheel and sdist
        run: uv build

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            dist/state-merger.exe
            dist/*.whl
            dist/*.tar.gz

  release-assets:
    name: "Add GitHub Release Assets"
    runs-on: ubuntu-latest
    needs: build-gui-windows
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
      ARTIFACT_NAME: state-merger-${{ github.run_id }}

    steps:
      - name: Checkout tag contents
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: release-assets

      - name: Publish GitHub Release Assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.TAG_NAME }}
          overwrite_files: true
          files: |
            release-assets/**/*.exe
            release-assets/**/*.whl
            release-assets/**/*.tar.gz
            merge_states.json

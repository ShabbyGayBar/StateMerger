name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-gui-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller build

      - name: Build GUI EXE
        run: pyinstaller -F -n state-merger -p "src" -w -i "docs/images/states.dds" -y --clean src/vic3_state_merger/gui.py

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: state-merger-${{ github.ref_name }}
          path: |
            dist/state-merger.exe
            dist/*.whl
            dist/*.tar.gz

  release-assets:
    name: "Add GitHub Release Assets"
    runs-on: ubuntu-latest
    needs: build-gui-windows
    permissions:
      contents: write

    steps:
      - name: Checkout tag contents
        uses: actions/checkout@v4

      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          name: state-merger-${{ github.ref_name }}
          path: release-assets

      - name: Publish GitHub Release Assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            release-assets/**/*.exe
            release-assets/**/*.whl
            release-assets/**/*.tar.gz
            merge_states.json
